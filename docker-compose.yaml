services:
  web:
    build:
      context: .
      dockerfile: Dockerfile

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "${WEB_PORT}:8069"
      - "${LONGPOLLING_PORT}:8072"

    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./docker_scripts:/opt/odoo-dev-scripts:ro

    env_file:
      - env.local

    environment:
      PYCHARM_DEBUG: ${PYCHARM_DEBUG}
      PYCHARM_DEBUG_WAIT: ${PYCHARM_DEBUG_WAIT}
      PYCHARM_DEBUG_HOST: ${PYCHARM_DEBUG_HOST}
      PYCHARM_DEBUG_PORT: ${PYCHARM_DEBUG_PORT}
      ODOO_DEV_MODE: ${ODOO_DEV_MODE}

    extra_hosts:
      - "host.docker.internal:host-gateway"
      # ddev-router IP — update if broken: docker inspect ddev-router --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}'
      - "fin.ddev.site:172.18.0.7"
      # Pins 'db' to our own PostgreSQL — prevents ddev_default network from resolving it to a DDEV container
      # Update if broken: docker inspect home_finance_db --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}'
      - "db:172.24.0.2"

    networks:
      - default
      - ddev_default

    entrypoint: ["/opt/odoo-dev-scripts/start-odoo.sh"]

  db:
    image: postgres:18
    restart: unless-stopped
    container_name: home_finance_db

    ports:
      - "5433:5432"

    env_file:
      - env.local

    environment:
      POSTGRES_DB: ${ODOO_DB_NAME}
      POSTGRES_USER: ${ODOO_DB_USER}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - odoo-db-data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ODOO_DB_USER} -d ${ODOO_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  odoo-web-data:
  odoo-db-data:

networks:
  ddev_default:
    external: true
